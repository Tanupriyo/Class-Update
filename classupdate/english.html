        }

            font-weight: bold;
            color: #0400ff;

        }
        .description-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #0400ff;
            border-radius: 5px;
            font-size: 14px;

            margin-bottom: 10px;
            font-family: Arial, sans-serif;

<body>
     <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
    background: #0011ff;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    border-radius: 10px;
}

/* Logo */
.logo {
    font-size: 22px;
    font-weight: bold;
}

/* Hide checkbox */
#menu-toggle {
    display: none;
}

/* Hamburger icon */
.hamburger {
    width: 30px;
    height: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
}

.hamburger span {
    height: 4px;
    width: 100%;
    background: white;
    border-radius: 5px;
    transition: 0.3s;
}

/* Menu panel */
.nav-links {
    position: fixed;
    top: 0;
    right: -100%;
    height: 100vh;
    width: 250px;
    background: #67baff;
    display: flex;
    flex-direction: column;
    padding-top: 80px;
    transition: 0.4s;
}

/* Menu links */
.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 20px;
    padding: 15px 25px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: #ff0000;
    padding-left: 35px;
}

/* Show menu */
#menu-toggle:checked ~ .nav-links {
    right: 0;
}

/* Animate hamburger into cross */
#menu-toggle:checked + label .line1 {
    transform: rotate(45deg) translate(5px, 5px);
}
#menu-toggle:checked + label .line2 {
    opacity: 0;
}
#menu-toggle:checked + label .line3 {
    transform: rotate(-45deg) translate(6px, -6px);
}

/* Close button inside menu */
.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    color: white;
    cursor: pointer;
}

.close-btn:hover {
    color: #00ffcc;
}
</style>
</head>

<body>

<nav class="navbar">

    <div class="logo">English</div>

    <!-- Hidden checkbox -->
    <input type="checkbox" id="menu-toggle">

    <!-- Hamburger -->
    <label for="menu-toggle" class="hamburger">
        <span class="line1"></span>
        <span class="line2"></span>
        <span class="line3"></span>
    </label>

    <!-- Menu -->
    <div class="nav-links">

        <!-- Close button -->
        <label for="menu-toggle" class="close-btn">&times;</label>

        <a href="history.html">History</a>
        <a href="geography.html">Geography</a>
        <a href="science.html">Science</a>

    </div>

</nav>
    <div class="datetime-display">
        <div id="currentDate"></div>
        <div id="currentTime"></div>
    </div>
    
    <div class="updates-section">
        <h2>Add Class Update</h2>
        <input type="text" id="titleInput" class="update-input" placeholder="Enter update title..." />
        <textarea id="descriptionInput" class="description-input" placeholder="Enter update description..."></textarea>
        <button class="update-btn" onclick="addUpdate()">Add Update</button>
        
        <h3>Recent Updates</h3>
        <ul id="updatesList" class="update-list"></ul>
    </div>
    
    <p class="clupdtp"></p>

    <script>
        let updates = [];
        const PASSWORD = 'update123'; // Password required to delete updates
        
        function updateDateTime() {
            const now = new Date();
            
            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            
            // Format time
            const timeString = now.toLocaleTimeString('en-US');
            
            document.getElementById('currentDate').textContent = 'Date: ' + dateString;
            document.getElementById('currentTime').textContent = 'Time: ' + timeString;
        }
        
        function addUpdate() {
            const titleInput = document.getElementById('titleInput');
            const descriptionInput = document.getElementById('descriptionInput');
            const title = titleInput.value.trim();
            const description = descriptionInput.value.trim();
            
            if (title === '') {
                alert('Please enter a title');
                return;
            }
            
            if (description === '') {
                alert('Please enter a description');
                return;
            }
            
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            const timeString = now.toLocaleTimeString('en-US');
            
            const update = {
                title: title,
                description: description,
                date: dateString,
                time: timeString
            };
            
            updates.unshift(update);
            titleInput.value = '';
            descriptionInput.value = '';
            displayUpdates();
        }
        
        function displayUpdates() {
            const updatesList = document.getElementById('updatesList');
            updatesList.innerHTML = '';
            
            updates.forEach((update, index) => {
                const li = document.createElement('li');
                li.className = 'update-item';
                li.innerHTML = `
                    <div class="update-item-container">
                        <div class="update-content">
                            <div class="update-title">${update.title}</div>
                            <div class="update-description">${update.description}</div>
                            <div class="update-time">${update.date} at ${update.time}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteUpdate(${index})">Delete</button>
                    </div>
                `;
                updatesList.appendChild(li);
            });
        }
        
        // Update date and time on page load
        updateDateTime();
        
        // Update every second
        setInterval(updateDateTime, 1000);
        
        function deleteUpdate(index) {
            const password = prompt('Enter password to delete this update:');
            if (password === null) {
                return; // User cancelled
            }
            if (password !== PASSWORD) {
                alert('Incorrect password');
                return;
            }
            if (confirm('Are you sure you want to delete this update?')) {
                updates.splice(index, 1);
                displayUpdates();
            }
        }
        
        // Allow Enter key to add update
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('titleInput').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    addUpdate();
                }
            });
        });
        
        function updateClassUpdate() {
            // Add your class update logic here
        }
    </script>
</body>    
</html>
