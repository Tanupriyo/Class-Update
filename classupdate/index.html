<body>
 <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
    background: #0011ff;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    border-radius: 10px;
}

/* Logo */
.logo {
    font-size: 22px;
    font-weight: bold;
}

/* Hide checkbox */
#menu-toggle {
    display: none;
}

/* Hamburger icon */
.hamburger {
    width: 30px;
    height: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
}

.hamburger span {
    height: 4px;
    width: 100%;
    background: white;
    border-radius: 5px;
    transition: 0.3s;
}

/* Menu panel */
.nav-links {
    position: fixed;
    top: 0;
    right: -100%;
    height: 100vh;
    width: 250px;
    background: #67baff;
    display: flex;
    flex-direction: column;
    padding-top: 80px;
    transition: 0.4s;
}

/* Menu links */
.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 20px;
    padding: 15px 25px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: #ff0000;
    padding-left: 35px;
}

/* Show menu */
#menu-toggle:checked ~ .nav-links {
    right: 0;
}

/* Animate hamburger into cross */
#menu-toggle:checked + label .line1 {
    transform: rotate(45deg) translate(5px, 5px);
}
#menu-toggle:checked + label .line2 {
    opacity: 0;
}
#menu-toggle:checked + label .line3 {
    transform: rotate(-45deg) translate(6px, -6px);
}

/* Close button inside menu */
.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    color: white;
    cursor: pointer;
}

.close-btn:hover {
    color: #00ffcc;
}
.whastapp {
    display: block;
    width: 600px;
    margin: 30px auto;
    padding: 10px;
    background-color: #25D366;
    color: rgb(255, 255, 255);
    text-align: center;
    text-decoration: none;
    border-radius: 5px;
    font-size: 18px;
}
</style>
</head>

<body>

<nav class="navbar">

    <div class="logo">Class Update</div>

    <!-- Hidden checkbox -->
    <input type="checkbox" id="menu-toggle">

    <!-- Hamburger -->
    <label for="menu-toggle" class="hamburger">
        <span class="line1"></span>
        <span class="line2"></span>
        <span class="line3"></span>
    </label>

    <!-- Menu -->
    <div class="nav-links">

        <!-- Close button -->
        <label for="menu-toggle" class="close-btn">&times;</label>

        <a href="science.html">Science</a>

    </div>

</nav>

    </div>
    <div class="datetime-display" id="datetime"></div>

     <h2 class="whastapp">Our WhatsApp Group</h2>
    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const formattedDateTime = now.toLocaleDateString('en-US', options);
            document.getElementById('datetime').textContent = formattedDateTime;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>

</body>
